<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel Pro</title>

<style>
body {
  background: #0f0f0f;
  color: white;
  font-family: sans-serif;
  padding: 20px;
}

h1 { color: gold; }

select, input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

button {
  background: gold;
  cursor: pointer;
  font-weight: bold;
}

.card {
  background: #1a0000;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.small-btn {
  padding: 5px 8px;
  font-size: 12px;
}
</style>
</head>

<body>

<h1>⚙️ Admin Panel Pro</h1>

<select id="gameSelect" onchange="loadData()"></select>

<!-- PRODUK -->
<h3>Produk</h3>
<div id="productList"></div>

<h4>Tambah Produk</h4>
<input type="text" id="name" placeholder="Nama">
<input type="number" id="price" placeholder="Harga">
<button onclick="addProduct()">Tambah</button>

<!-- SETTINGS -->
<h3>WhatsApp</h3>
<input type="text" id="wa">
<button onclick="saveWA()">Simpan</button>

<!-- PAYMENTS -->
<h3>Rekening</h3>
<div id="paymentList"></div>

<h4>Tambah Rekening</h4>
<input type="text" id="bankName" placeholder="Bank">
<input type="text" id="bankNumber" placeholder="Nomor">
<input type="text" id="bankOwner" placeholder="Atas Nama">
<button onclick="addBank()">Tambah Rekening</button>

<script>

/* ================= CONFIG ================= */
const API_KEY = "$2a$10$HSdyWxkoHRvw8WW4pgFIsu.2n770vint7YnkPbh10QIsvW5VeLf/e";

const BINS = {
  valorant: "69d254a6aaba882197c7f32b",
  hok: "69d254d1856a682189ffb925",
  roblox: "69d25516aaba882197c7f4e7",
  pubg: "69d2553daaba882197c7f551",
  mlbb: "69d2556d36566621a87f2582",
  ff: "69d255a8856a682189ffbba8"
};

/* ================= TOAST NOTIF ================= */
function showToast(msg) {
  let toast = document.getElementById("toast");

  if (!toast) {
    toast = document.createElement("div");
    toast.id = "toast";
    toast.style = `
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #111;
      color: gold;
      padding: 12px 16px;
      border-radius: 10px;
      z-index: 9999;
      font-size: 14px;
    `;
    document.body.appendChild(toast);
  }

  toast.innerText = msg;
  toast.style.display = "block";

  setTimeout(() => {
    toast.style.display = "none";
  }, 2500);
}

/* ================= INIT ================= */
function init() {
  const select = document.getElementById("gameSelect");

  for (let key in BINS) {
    select.innerHTML += `<option value="${key}">${key.toUpperCase()}</option>`;
  }

  loadData();
}

/* ================= FETCH ================= */
async function getData(binId) {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
    headers: { "X-Master-Key": API_KEY }
  });
  const json = await res.json();
  return json.record;
}

async function updateData(binId, data) {
  await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": API_KEY
    },
    body: JSON.stringify(data)
  });
}

/* ================= LOAD ================= */
async function loadData() {
  const game = gameSelect.value;
  const binId = BINS[game];

  const data = await getData(binId);
  window.currentData = data;

  if (!data.products) data.products = [];
  if (!data.settings) data.settings = {};
  if (!data.payments) data.payments = [];

  renderProducts();
  renderPayments();

  wa.value = data.settings.whatsapp || "";
}

/* ================= PRODUK ================= */
function renderProducts() {
  productList.innerHTML = "";

  currentData.products.forEach((p, i) => {
    productList.innerHTML += `
      <div class="card">
        <div class="row">
          <div>
            <b>${p.name}</b><br>
            Rp${p.price} <br>
            Status: ${p.active ? "✅" : "❌"}
          </div>
          <div>
            <button class="small-btn" onclick="editProduct(${i})">✏️</button>
            <button class="small-btn" onclick="toggleProduct(${i})">🔄</button>
            <button class="small-btn" onclick="deleteProduct(${i})">❌</button>
          </div>
        </div>
      </div>
    `;
  });
}

async function addProduct() {
  currentData.products.push({
    name: name.value,
    price: parseInt(price.value),
    category: "general",
    active: true
  });

  showToast("✅ Produk ditambahkan");
  await save();
}

async function editProduct(i) {
  const p = currentData.products[i];
  const newPrice = prompt("Harga baru:", p.price);

  if (!newPrice) return;

  p.price = parseInt(newPrice);

  showToast("✏️ Produk diperbarui");
  await save();
}

async function toggleProduct(i) {
  currentData.products[i].active = !currentData.products[i].active;

  showToast("🔄 Status produk diubah");
  await save();
}

async function deleteProduct(i) {
  if (!confirm("⚠️ Yakin hapus produk ini?")) return;

  currentData.products.splice(i, 1);

  showToast("🗑️ Produk dihapus");
  await save();
}

/* ================= WA ================= */
async function saveWA() {
  currentData.settings.whatsapp = wa.value;

  showToast("💾 Nomor WhatsApp disimpan");
  await save();
}

/* ================= PAYMENT ================= */
function renderPayments() {
  paymentList.innerHTML = "";

  currentData.payments.forEach((p, i) => {
    paymentList.innerHTML += `
      <div class="card">
        ${p.name} - ${p.number} (${p.owner})
        <button onclick="deleteBank(${i})">❌</button>
      </div>
    `;
  });
}

async function addBank() {
  currentData.payments.push({
    name: bankName.value,
    number: bankNumber.value,
    owner: bankOwner.value,
    type: "bank",
    active: true
  });

  showToast("✅ Rekening ditambahkan");
  await save();
}

async function deleteBank(i) {
  if (!confirm("⚠️ Yakin hapus rekening ini?")) return;

  currentData.payments.splice(i, 1);

  showToast("🗑️ Rekening dihapus");
  await save();
}

/* ================= SAVE ================= */
async function save() {
  const game = gameSelect.value;
  const binId = BINS[game];

  await updateData(binId, currentData);

  showToast("💾 Data berhasil disimpan");
  loadData();
}

/* ================= INIT ================= */
init();

</script>

</body>
</html>
